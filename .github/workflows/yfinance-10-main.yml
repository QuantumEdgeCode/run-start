# ============================================================
# 工作流名称：运行 yfinance 股票数据采集器（20路并行）
# 功能描述：每周六北京时间09:00自动运行，使用20个独立IP并行下载全球股票数据
#          每个Worker自行读取全量任务列表，按 index % 20 取模分配任务
#          每个Worker调用仓库根目录的「获取行情数据yuk2修正1.py」核心函数
#          所有Worker完成后，合并数据并打包发布到GitHub Releases
#          发布完成后发送邮件通知（邮件包含20个节点IP、统计信息、Release链接）
#          邮件发送失败不影响整体流程
# 原始脚本：获取行情数据yuk2修正1.py（单IP需3.5-4小时）
# 优化后：20路并行，预计10-15分钟完成
# 作者：QuantumEdgecode & Deepseek-V4-Flash & 江城庄稼汉
# 更新时间：2026-05-18
# ============================================================

name: 运行 yfinance 股票数据采集器（20路并行）

# ============================================================
# 触发条件配置
# ============================================================
on:
  # 手动触发：允许在GitHub Actions页面手动运行
  workflow_dispatch:
  
  # 定时触发：每周六北京时间09:00执行
  # cron表达式：分 时 日 月 周
  # UTC 01:00 = 北京时间 09:00 (UTC+8)
  schedule:
    - cron: '0 1 * * 6'

# ============================================================
# 全局权限配置
# contents: write → 允许创建和上传Release资源
# actions: read  → 允许读取工作流运行信息
# ============================================================
permissions:
  contents: write
  actions: read

# ============================================================
# 作业定义（共4个作业）
# 作业0 record-start-time → 记录工作流开始时间戳
# 作业1 split-tasks       → 统计总任务数，输出20个Worker编号
# 作业2 download-worker    → 20路并行下载股票数据（矩阵策略）
# 作业3 merge-and-release  → 合并数据、打包、发布Release、发送邮件
# ============================================================
jobs:
  # ============================================================
  # 作业0：记录工作流开始时间
  # 功能：在第一个job中记录UTC时间戳
  #       后续作业通过 needs 引用此时间戳计算总运行时长
  # 原因：每个job的 START_TIME 只能记录本job的运行时间
  #       需要在整个工作流开始时就记录时间
  # ============================================================
  record-start-time:
    runs-on: ubuntu-latest
    outputs:
      workflow_start_time: ${{ steps.record.outputs.workflow_start_time }}
    steps:
      - name: 记录工作流开始时间戳
        id: record
        run: |
          echo "workflow_start_time=$(date -u +%s)" >> $GITHUB_OUTPUT

  # ============================================================
  # 作业1：拆分任务
  # 功能：读取markets-y2.json和各市场股票代码文件，统计总任务数
  #       输出20个Worker编号 [1,2,3,...,20]
  # 关键：只传编号不传任务数据，输出远小于1MB限制
  # ============================================================
  split-tasks:
    # 依赖：等待record-start-time完成
    needs: record-start-time
    runs-on: ubuntu-latest
    outputs:
      worker_ids: ${{ steps.split.outputs.worker_ids }}
    
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
      
      - name: 统计任务数并输出Worker编号
        id: split
        run: |
          python3 << 'EOF'
          import json, os

          with open('markets-y2.json', 'r', encoding='utf-8') as f:
              markets = json.load(f)

          total = 0
          for m in markets:
              file_name = m['file_name']
              code_file = f"./{file_name}"
              if not os.path.exists(code_file):
                  code_file = f"./yfcode-list/{file_name}"
              if not os.path.exists(code_file):
                  continue
              with open(code_file, 'r', encoding='utf-8') as f:
                  total += len([line.strip() for line in f if line.strip()])

          workers = 20
          worker_ids = list(range(1, workers + 1))

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"worker_ids={json.dumps(worker_ids)}\n")

          print(f"总任务数: {total} 只股票, 拆分为 {workers} 组")
          EOF

  # ============================================================
  # 作业2：20路并行下载股票数据
  # ============================================================
  download-worker:
    needs: split-tasks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        worker_id: ${{ fromJson(needs.split-tasks.outputs.worker_ids) }}
    
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
      
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装Python依赖包
        run: pip install yfinance pandas openpyxl curl_cffi
      
      - name: 获取本节点公网IP地址
        run: |
          IP=$(curl -s https://api64.ipify.org?format=json | jq -r '.ip')
          mkdir -p ./logs
          echo "Worker ${{ matrix.worker_id }} IP: $IP" >> ./logs/worker_ips.txt
          echo "Worker ${{ matrix.worker_id }} 公网IP: $IP"
      
      - name: 执行股票数据下载
        run: |
          python3 << 'PYEOF'
          import json, os, sys, time

          sys.path.insert(0, '.')
          from 获取行情数据yuk2修正1 import get_stock_data, write_data, get_current_date

          worker_id = ${{ matrix.worker_id }}
          total_workers = 20

          with open('markets-y2.json', 'r', encoding='utf-8') as f:
              markets = json.load(f)

          all_tasks = []
          for m in markets:
              market = m['market']
              interval = m['interval']
              period = m['period']
              save_format = m['save_format']
              file_name = m['file_name']

              if interval == "1m" and period == "max":
                  period = "7d"

              code_file = f"./{file_name}"
              if not os.path.exists(code_file):
                  code_file = f"./yfcode-list/{file_name}"
              if not os.path.exists(code_file):
                  continue

              with open(code_file, 'r', encoding='utf-8') as f:
                  tickers = [line.strip() for line in f if line.strip()]

              for ticker in tickers:
                  all_tasks.append([market, interval, period, save_format, ticker])

          my_tasks = [t for i, t in enumerate(all_tasks) if i % total_workers == worker_id - 1]

          print(f"Worker {worker_id}: 全量 {len(all_tasks)} 只股票, 本节点分配 {len(my_tasks)} 只")

          success = 0
          fail = 0
          start_time = time.time()

          for market, interval, period, save_format, ticker in my_tasks:
              try:
                  stock_data = get_stock_data(ticker, period=period, interval=interval)
                  if stock_data is None or stock_data.empty:
                      raise ValueError("无数据返回")

                  date_str = get_current_date()
                  save_dir = f"./data/{market}/{interval}/{date_str}"
                  write_data(stock_data, ticker, save_dir, save_format)

                  success += 1
                  if success % 100 == 0:
                      elapsed = time.time() - start_time
                      print(f"  Worker {worker_id}: 已完成 {success}/{len(my_tasks)} 只, 用时 {elapsed:.0f}秒")

                  time.sleep(0.1)

              except Exception as e:
                  fail += 1
                  if fail <= 5:
                      print(f"  Worker {worker_id}: {ticker} 失败 - {str(e)[:100]}")

          os.makedirs('./logs', exist_ok=True)
          with open(f'./logs/worker_{worker_id}_stats.txt', 'w') as f:
              f.write(f"worker_id={worker_id}\n")
              f.write(f"success={success}\n")
              f.write(f"fail={fail}\n")
              f.write(f"total={len(my_tasks)}\n")

          elapsed = time.time() - start_time
          print(f"Worker {worker_id} 完成: 成功={success}, 失败={fail}, 用时={elapsed:.0f}秒")
          PYEOF

      - name: 上传本节点下载结果
        uses: actions/upload-artifact@v4
        with:
          name: worker-${{ matrix.worker_id }}-data
          path: |
            ./data/
            ./logs/
          retention-days: 1

  # ============================================================
  # 作业3：合并数据并发布Release
  # ============================================================
  merge-and-release:
    # 依赖：等待record-start-time和download-worker都完成
    needs: [record-start-time, download-worker]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
      
      - name: 生成版本号和时间戳
        id: version
        run: |
          BEIJING_DATE=$(TZ='Asia/Shanghai' date '+%Y%m%d')
          VERSION="v${BEIJING_DATE}-${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_NAME=Stock Data ${VERSION}" >> $GITHUB_ENV
          echo "REPORT_DATE=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %T')" >> $GITHUB_ENV
          echo "BEIJING_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
      
      - name: Create directories
        run: mkdir -p ./data ./logs
      
      - name: 下载所有节点数据到集中缓存目录
        uses: actions/download-artifact@v4
        with:
          path: ./merged
          pattern: worker-*-data
          merge-multiple: true
      
      - name: 收集所有节点统计信息和IP地址
        run: |
          # 读取20个Worker的IP列表
          WORKER_IP_LIST=""
          if [ -f "./merged/logs/worker_ips.txt" ]; then
            WORKER_IP_LIST=$(cat ./merged/logs/worker_ips.txt)
          fi
          echo "WORKER_IP_LIST<<EOF" >> $GITHUB_ENV
          echo "$WORKER_IP_LIST" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # 生成统计汇总
          echo "# 20路并行Worker统计汇总" > ./logs/workers_summary.txt
          echo "# 生成时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') 北京时间" >> ./logs/workers_summary.txt
          echo "" >> ./logs/workers_summary.txt
          
          if [ -f "./merged/logs/worker_ips.txt" ]; then
            echo "## 节点IP地址列表" >> ./logs/workers_summary.txt
            echo '```' >> ./logs/workers_summary.txt
            cat ./merged/logs/worker_ips.txt >> ./logs/workers_summary.txt
            echo '```' >> ./logs/workers_summary.txt
            echo "" >> ./logs/workers_summary.txt
          fi
          
          echo "## Worker执行统计" >> ./logs/workers_summary.txt
          echo "" >> ./logs/workers_summary.txt
          
          TOTAL_SUCCESS=0
          TOTAL_FAIL=0
          WORKER_COUNT=0
          
          for stats_file in ./merged/logs/worker_*_stats.txt; do
            if [ -f "$stats_file" ]; then
              source "$stats_file"
              echo "Worker $worker_id: 成功=$success, 失败=$fail, 总计=$total" >> ./logs/workers_summary.txt
              TOTAL_SUCCESS=$((TOTAL_SUCCESS + success))
              TOTAL_FAIL=$((TOTAL_FAIL + fail))
              WORKER_COUNT=$((WORKER_COUNT + 1))
            fi
          done
          
          TOTAL=$((TOTAL_SUCCESS + TOTAL_FAIL))
          
          echo "" >> ./logs/workers_summary.txt
          echo "## 汇总" >> ./logs/workers_summary.txt
          echo "- 活跃Worker数: $WORKER_COUNT / 20" >> ./logs/workers_summary.txt
          echo "- 总成功: $TOTAL_SUCCESS" >> ./logs/workers_summary.txt
          echo "- 总失败: $TOTAL_FAIL" >> ./logs/workers_summary.txt
          echo "- 总计: $TOTAL" >> ./logs/workers_summary.txt
          
          echo "TOTAL_SUCCESS=$TOTAL_SUCCESS" >> $GITHUB_ENV
          echo "TOTAL_FAIL=$TOTAL_FAIL" >> $GITHUB_ENV
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "WORKER_COUNT=$WORKER_COUNT" >> $GITHUB_ENV
      
      - name: 合并股票数据文件
        run: |
          if [ -d "./merged/data" ]; then
            cp -r ./merged/data/* ./data/ 2>/dev/null || true
          fi
          FILE_COUNT=$(find ./data -type f | wc -l)
          echo "FILE_COUNT=$FILE_COUNT" >> $GITHUB_ENV
          if [ "$FILE_COUNT" -gt "0" ]; then
            echo "HAS_DATA=true" >> $GITHUB_ENV
          else
            echo "HAS_DATA=false" >> $GITHUB_ENV
          fi
      
      # 使用工作流开始时记录的时间戳计算总运行时长
      - name: 计算工作流总运行时长
        if: always()
        run: |
          WORKFLOW_START=${{ needs.record-start-time.outputs.workflow_start_time }}
          END_TIME=$(date -u '+%s')
          DURATION=$((END_TIME - WORKFLOW_START))
          H=$((DURATION / 3600))
          M=$(((DURATION % 3600) / 60))
          S=$((DURATION % 60))
          DURATION_FORMATTED=$(printf "%02d:%02d:%02d" $H $M $S)
          echo "DURATION=$DURATION_FORMATTED" >> $GITHUB_ENV
          echo "工作流总运行时长: $DURATION_FORMATTED"
      
      - name: 打包股票数据文件
        if: always()
        run: |
          if [ "${{ env.HAS_DATA }}" = "true" ]; then
            zip -r stock_data_${{ env.VERSION }}.zip ./data/ -x "*.git*"
            DATA_SIZE=$(du -h stock_data_${{ env.VERSION }}.zip | cut -f1)
            echo "DATA_SIZE=$DATA_SIZE" >> $GITHUB_ENV
          else
            echo "DATA_SIZE=0" >> $GITHUB_ENV
          fi
      
      - name: 打包日志文件
        if: always()
        run: |
          zip -r workflow_logs_${{ env.VERSION }}.zip ./logs/ ./merged/logs/
          LOG_SIZE=$(du -h workflow_logs_${{ env.VERSION }}.zip | cut -f1)
          echo "LOG_SIZE=$LOG_SIZE" >> $GITHUB_ENV
      
      - name: 生成Release描述文件
        if: always()
        run: |
          cat > ./release_body.md << EOF
          ## Stock Data Collector - 20路并行
          
          | 项目 | 信息 |
          |:---|:---|
          | **版本** | ${{ env.VERSION }} |
          | **时间** | ${{ env.BEIJING_TIME }} (北京时间) |
          | **运行时长** | ${{ env.DURATION }} |
          | **模式** | 20路并行 |
          | **活跃Worker** | ${{ env.WORKER_COUNT }} / 20 |
          
          ### 节点IP
          ${{ env.WORKER_IP_LIST }}
          
          ### 数据统计
          | 项目 | 数值 |
          |:---|:---|
          | 成功 | ${{ env.TOTAL_SUCCESS }} |
          | 失败 | ${{ env.TOTAL_FAIL }} |
          | 总计 | ${{ env.TOTAL }} |
          | CSV文件数 | ${{ env.FILE_COUNT }} |
          
          ### 附件
          - stock_data_${{ env.VERSION }}.zip (${{ env.DATA_SIZE }})
          - workflow_logs_${{ env.VERSION }}.zip (${{ env.LOG_SIZE }})
          
          [查看运行日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
      
      - name: 获取Release页面链接
        if: always()
        run: |
          echo "RELEASE_URL=${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.VERSION }}" >> $GITHUB_ENV
      
      - name: 创建Release并上传数据包
        id: create_release
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.RELEASE_NAME }}
          body_path: ./release_body.md
          files: |
            stock_data_${{ env.VERSION }}.zip
            workflow_logs_${{ env.VERSION }}.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 发送邮件通知
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_ADDRESS }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 通知UT (${{ env.REPORT_DATE }})
          to: ${{ secrets.MAIL_TO }}
          from: 数据通知/UT
          attachments: workflow_logs_${{ env.VERSION }}.zip
          html_body: |
            <!DOCTYPE html>
            <html>
            <head>
              <style>
                body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
                .container { max-width: 650px; margin: 0 auto; padding: 20px; }
                .header { background: linear-gradient(135deg, #24292e 0%, #2b3137 100%); color: white; padding: 20px; border-radius: 10px 10px 0 0; }
                .content { background: #f8f9fa; padding: 20px; border-radius: 0 0 10px 10px; }
                .info-row { display: flex; padding: 10px; border-bottom: 1px solid #dee2e6; }
                .info-label { font-weight: bold; width: 150px; color: #495057; }
                .info-value { flex: 1; color: #212529; }
                .button { display: inline-block; background: #2ea44f; color: white !important; padding: 12px 24px; text-decoration: none; border-radius: 6px; margin: 10px 5px; font-weight: bold; }
                .button-secondary { background: #0366d6; }
                .release-box { background: #e7f3ff; border: 1px solid #0366d6; border-radius: 8px; padding: 15px; margin: 15px 0; }
                .release-box h3 { margin-top: 0; color: #0366d6; }
                .file-list { background: white; border-radius: 6px; padding: 10px; margin: 10px 0; }
                .file-item { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; }
                .file-item:last-child { border-bottom: none; }
                .file-icon { margin-right: 10px; font-size: 20px; }
                .file-name { flex: 1; font-family: monospace; }
                .file-size { color: #666; font-size: 12px; }
                .footer { margin-top: 20px; font-size: 12px; color: #6c757d; text-align: center; border-top: 1px solid #dee2e6; padding-top: 15px; }
                .attachment-note { background: #fff3cd; border-left: 4px solid #ffc107; padding: 10px; margin: 15px 0; border-radius: 4px; }
                .ip-box { background: #f0f0f0; border-radius: 4px; padding: 8px 12px; margin: 5px 0; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
              </style>
            </head>
            <body>
              <div class="container">
                <div class="header">
                  <h1>股票数据发布报告（20路并行）</h1>
                  <p>版本: ${{ env.VERSION }} | 报告时间: ${{ env.BEIJING_TIME }}</p>
                </div>
                
                <div class="content">
                  <div class="release-box">
                    <h3>GitHub Release 信息</h3>
                    <div class="info-row">
                      <span class="info-label">版本标签:</span>
                      <span class="info-value"><code>${{ env.VERSION }}</code></span>
                    </div>
                    <div class="info-row">
                      <span class="info-label">发布名称:</span>
                      <span class="info-value">${{ env.RELEASE_NAME }}</span>
                    </div>
                    <div class="info-row">
                      <span class="info-label">下载模式:</span>
                      <span class="info-value">20路并行 (${{ env.WORKER_COUNT }}/20 Worker)</span>
                    </div>
                    <div class="info-row">
                      <span class="info-label">数据文件数:</span>
                      <span class="info-value">${{ env.FILE_COUNT }} 个 CSV</span>
                    </div>
                    
                    <div class="file-list">
                      <div class="file-item">
                        <span class="file-icon">📊</span>
                        <span class="file-name">stock_data_${{ env.VERSION }}.zip</span>
                        <span class="file-size">${{ env.DATA_SIZE || '无数据' }}</span>
                      </div>
                      <div class="file-item">
                        <span class="file-icon">📋</span>
                        <span class="file-name">workflow_logs_${{ env.VERSION }}.zip</span>
                        <span class="file-size">${{ env.LOG_SIZE }}</span>
                      </div>
                    </div>
                    
                    <div style="text-align: center;">
                      <a href="${{ env.RELEASE_URL }}" class="button" style="color: white !important;">
                        访问 Release 页面
                      </a>
                    </div>
                  </div>
                  
                  <div class="info-row">
                    <span class="info-label">工作流:</span>
                    <span class="info-value">${{ github.workflow }} #${{ github.run_number }}</span>
                  </div>
                  
                  <div class="info-row">
                    <span class="info-label">执行时间:</span>
                    <span class="info-value">${{ env.BEIJING_TIME }} (北京时间)</span>
                  </div>
                  
                  <div class="info-row">
                    <span class="info-label">运行时长:</span>
                    <span class="info-value">${{ env.DURATION }}</span>
                  </div>
                  
                  <div class="info-row">
                    <span class="info-label">成功/失败:</span>
                    <span class="info-value">${{ env.TOTAL_SUCCESS }} / ${{ env.TOTAL_FAIL }} (总计 ${{ env.TOTAL }})</span>
                  </div>
                  
                  <div class="info-row">
                    <span class="info-label">节点IP:</span>
                    <span class="info-value">
                      <div class="ip-box">${{ env.WORKER_IP_LIST }}</div>
                    </span>
                  </div>
                  
                  <div style="text-align: center; margin-top: 20px;">
                    <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" class="button button-secondary" style="color: white !important;">
                      查看工作流日志
                    </a>
                  </div>
                  
                  <p style="margin-top: 15px; word-break: break-all; font-size: 12px;">
                    <strong>Release 直链:</strong><br>
                    <a href="${{ env.RELEASE_URL }}" style="color: #0366d6;">${{ env.RELEASE_URL }}</a>
                  </p>
                  
                  <div class="attachment-note">
                    <strong>邮件附件说明:</strong><br>
                    本邮件包含工作流日志附件 (workflow_logs_${{ env.VERSION }}.zip, 大小: ${{ env.LOG_SIZE }})<br>
                    日志中包含20个Worker节点的详细统计信息和IP地址。<br>
                    完整数据文件请访问上方的 Release 页面下载。
                  </div>
                  
                  <div class="footer">
                    <p>此邮件由 GitHub Actions 自动发送</p>
                    <p>仓库: ${{ github.repository }} | 运行 ID: ${{ github.run_id }}</p>
                    <p>${{ env.BEIJING_TIME }}</p>
                    <p>20路并行下载</p>
                    <p>数据仅存储在 Release 中，不占用仓库 LFS 配额</p>
                  </div>
                </div>
              </div>
            </body>
            </html>
        continue-on-error: true
      
      - name: 清理临时文件
        if: always()
        run: |
          rm -rf ./merged
          rm -f stock_data_${{ env.VERSION }}.zip
          rm -f workflow_logs_${{ env.VERSION }}.zip
