# ============================================================
# 工作流名称：Run yfinance Stock Data Collector (20路并行)
# 功能描述：每周六北京时间09:00自动运行，使用20个独立IP并行下载全球股票数据
#          将股票列表均分为20组，每组由一个独立Worker节点负责下载
#          所有Worker完成后，合并数据并打包发布到GitHub Releases
#          发布完成后发送邮件通知（通知失败不影响发布）
# 原始脚本：获取行情数据yuk2修正1.py（单IP需3.5-4小时）
# 优化后：20路并行，预计10-15分钟完成
# 更新时间：2026-05-18
# ============================================================

name: Run yfinance Stock Data Collector (20路并行)

# ============================================================
# 触发条件配置
# ============================================================
on:
  # 手动触发：允许在GitHub Actions页面手动运行
  workflow_dispatch:
  
  # 定时触发：每周六北京时间09:00执行
  # cron表达式：分 时 日 月 周
  # UTC 01:00 = 北京时间 09:00 (UTC+8)
  schedule:
    - cron: '0 1 * * 6'

# ============================================================
# 全局权限配置
# 解决"Resource not accessible by integration"权限错误
# ============================================================
permissions:
  contents: write  # 允许创建和上传Release资源
  actions: read    # 允许读取工作流运行信息

# ============================================================
# 作业定义
# ============================================================
jobs:
  # ============================================================
  # 作业1：拆分股票列表为20份
  # 功能：读取markets-y2.json市场配置和各市场股票代码文件
  #       将所有股票代码汇总后，平均拆分为20组
  #       每组作为一个独立任务，分配给后续的Worker节点
  # 输出：matrix（包含20个Worker的任务分配信息）
  # ============================================================
  split-tasks:
    # 运行环境：Ubuntu最新版
    runs-on: ubuntu-latest
    
    # 输出变量：供下游作业使用
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}  # 20组任务的JSON数组
    
    steps:
      # ----------------------------------------------------------
      # 步骤1.1：检出仓库代码
      # 获取markets-y2.json和所有股票代码文件
      # ----------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # ----------------------------------------------------------
      # 步骤1.2：拆分任务
      # 读取市场配置文件，遍历所有股票代码
      # 将所有(市场, 股票代码)组合平均拆分为20组
      # 输出JSON格式的矩阵配置给GitHub Actions
      # ----------------------------------------------------------
      - name: 拆分任务
        id: split
        run: |
          # 使用Python读取markets-y2.json，将所有股票平均拆分为20组
          python3 << 'EOF'
          import json, os

          # ----------------------------------------------------------
          # 第1步：加载市场配置文件
          # markets-y2.json包含每个市场的参数：
          #   market: 市场名称
          #   interval: K线周期（1m/5m/1d等）
          #   period: 数据范围（max/1y/6mo等）
          #   save_format: 保存格式（csv）
          #   file_name: 股票代码列表文件名
          # ----------------------------------------------------------
          with open('markets-y2.json', 'r', encoding='utf-8') as f:
              markets = json.load(f)

          # ----------------------------------------------------------
          # 第2步：遍历所有市场，收集全部股票任务
          # 每个任务包含：[市场名, K线周期, 数据范围, 保存格式, 股票代码]
          # ----------------------------------------------------------
          all_tasks = []
          for m in markets:
              market = m['market']           # 市场名称，如"hk"、"us"
              interval = m['interval']       # K线周期，如"1d"、"1m"
              period = m['period']           # 数据范围，如"max"、"1y"
              save_format = m['save_format'] # 文件格式，如"csv"
              file_name = m['file_name']     # 股票代码文件名

              # 修正：1分钟线数据的period不能超过7天
              if interval == "1m" and period == "max":
                  period = "7d"

              # 查找股票代码文件（先找根目录，再找yfcode-list子目录）
              code_file = f"./{file_name}"
              if not os.path.exists(code_file):
                  code_file = f"./yfcode-list/{file_name}"
              if not os.path.exists(code_file):
                  continue  # 文件不存在则跳过该市场

              # 读取股票代码列表（每行一个代码，跳过空行）
              with open(code_file, 'r', encoding='utf-8') as f:
                  tickers = [line.strip() for line in f if line.strip()]

              # 将每个股票代码封装为任务
              for ticker in tickers:
                  all_tasks.append([market, interval, period, save_format, ticker])

          # ----------------------------------------------------------
          # 第3步：将总任务平均拆分为20组
          # chunk_size：每组大约包含的任务数（向上取整）
          # ----------------------------------------------------------
          total = len(all_tasks)
          workers = 20  # Worker节点数量
          chunk_size = (total + workers - 1) // workers  # 向上取整

          # ----------------------------------------------------------
          # 第4步：构建矩阵配置
          # 每个Worker包含：
          #   worker_id: Worker编号（1-20）
          #   tasks: JSON格式的任务列表
          #   task_count: 该Worker的任务数量
          # ----------------------------------------------------------
          matrix = []
          for i in range(workers):
              start = i * chunk_size          # 起始索引
              end = min(start + chunk_size, total)  # 结束索引
              if start < total:               # 确保有任务才添加
                  chunk = all_tasks[start:end]
                  matrix.append({
                      "worker_id": i + 1,
                      "tasks": json.dumps(chunk),      # 序列化为JSON字符串
                      "task_count": len(chunk)         # 任务数量
                  })

          # ----------------------------------------------------------
          # 第5步：输出矩阵配置
          # 写入GITHUB_OUTPUT供GitHub Actions矩阵策略使用
          # ----------------------------------------------------------
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"total_tasks={total}\n")

          # 打印拆分结果摘要
          print(f"总任务数: {total}")
          for m in matrix:
              print(f"  Worker {m['worker_id']}: {m['task_count']} 个任务")
          EOF

  # ============================================================
  # 作业2：20路并行下载
  # 功能：每个Worker节点获取独立公网IP，下载分配给自己的股票数据
  #       使用矩阵策略并行运行最多20个Worker
  #       单个Worker失败不影响其他Worker继续执行
  #       每个Worker完成后将数据打包为artifact上传
  # ============================================================
  download-worker:
    # 依赖：等待任务拆分完成后才开始
    needs: split-tasks
    
    # 运行环境：Ubuntu最新版
    runs-on: ubuntu-latest
    
    # 超时设置：单个Worker最多运行60分钟
    timeout-minutes: 60
    
    # ----------------------------------------------------------
    # 矩阵策略：并行运行20个Worker
    # fail-fast: false  → 单个Worker失败不取消其他Worker
    # max-parallel: 20  → 最多同时运行20个Worker（GitHub免费版限制20）
    # ----------------------------------------------------------
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        worker: ${{ fromJson(needs.split-tasks.outputs.matrix) }}
    
    steps:
      # ----------------------------------------------------------
      # 步骤2.1：检出仓库代码
      # 虽然下载逻辑内嵌在yml中，但仍需检出以保持环境一致
      # ----------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # ----------------------------------------------------------
      # 步骤2.2：配置Python环境
      # 使用Python 3.11版本
      # ----------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # ----------------------------------------------------------
      # 步骤2.3：安装Python依赖
      # yfinance: 雅虎财经数据接口
      # pandas: 数据处理
      # openpyxl: Excel文件支持
      # curl_cffi: 模拟浏览器TLS指纹，绕过反爬
      # ----------------------------------------------------------
      - name: Install dependencies
        run: pip install yfinance pandas openpyxl curl_cffi
      
      # ----------------------------------------------------------
      # 步骤2.4：获取本Worker的公网IP地址
      # 用于后续通知和日志记录，证明使用了独立IP
      # ----------------------------------------------------------
      - name: 获取IP
        run: |
          IP=$(curl -s https://api64.ipify.org?format=json | jq -r '.ip')
          echo "WORKER_IP=$IP" >> $GITHUB_ENV
          echo "Worker ${{ matrix.worker.worker_id }} IP: $IP"
      
      # ----------------------------------------------------------
      # 步骤2.5：执行股票数据下载
      # 使用Python内嵌脚本，遍历分配给本Worker的所有任务
      # 每个股票：yfinance获取数据 → 保存CSV → 记录统计
      # 失败率超过30%则标记为失败
      # ----------------------------------------------------------
      - name: 执行下载
        run: |
          python3 << 'PYEOF'
          import json, os, sys, time, logging
          from datetime import datetime
          import yfinance as yf
          import pandas as pd

          # ----------------------------------------------------------
          # 第1步：获取当前Worker的任务信息
          # worker_id: 当前Worker编号（1-20）
          # tasks: 分配给本Worker的股票任务列表
          # ----------------------------------------------------------
          worker_id = ${{ matrix.worker.worker_id }}
          tasks = json.loads('''${{ matrix.worker.tasks }}''')

          print(f"Worker {worker_id}: 处理 {len(tasks)} 只股票")

          # 初始化成功/失败计数器
          success = 0
          fail = 0

          # ----------------------------------------------------------
          # 第2步：遍历所有任务，逐个下载股票数据
          # 每个任务格式：[market, interval, period, save_format, ticker]
          # ----------------------------------------------------------
          for market, interval, period, save_format, ticker in tasks:
              try:
                  # ----------------------------------------------------------
                  # 第2.1步：使用yfinance获取股票历史数据
                  # 最多重试2次（首次 + 1次重试）
                  # 重试间隔2秒，避免请求过快
                  # ----------------------------------------------------------
                  stock_data = None
                  for attempt in range(2):
                      try:
                          stock = yf.Ticker(ticker)
                          stock_data = stock.history(period=period, interval=interval)
                          if stock_data is not None and not stock_data.empty:
                              break  # 获取成功，跳出重试循环
                      except Exception as e:
                          if attempt == 1:
                              raise  # 最后一次重试仍失败，抛出异常
                          time.sleep(2)  # 等待2秒后重试

                  # 检查数据是否为空
                  if stock_data is None or stock_data.empty:
                      raise ValueError("No data")

                  # ----------------------------------------------------------
                  # 第2.2步：保存数据到文件
                  # 目录结构：./data/{市场名}/{K线周期}/{日期}/
                  # 文件名：{股票代码}.{格式}
                  # 如果文件已存在，自动添加序号后缀避免覆盖
                  # ----------------------------------------------------------
                  date_str = datetime.now().strftime('%Y-%m-%d')
                  save_dir = f"./data/{market}/{interval}/{date_str}"
                  os.makedirs(save_dir, exist_ok=True)

                  filename = f"{save_dir}/{ticker}.{save_format}"
                  counter = 1
                  while os.path.exists(filename):
                      filename = f"{save_dir}/{ticker}_{counter:02d}.{save_format}"
                      counter += 1

                  # 保存为CSV文件（UTF-8-BOM编码，兼容Excel）
                  if save_format == 'csv':
                      stock_data.to_csv(filename, encoding='utf-8-sig')

                  success += 1
                  
                  # 每处理100只股票打印一次进度
                  if success % 100 == 0:
                      print(f"  Worker {worker_id}: 已完成 {success} 只")

                  # 每个股票间短暂等待0.1秒，避免请求过于密集
                  time.sleep(0.1)

              except Exception as e:
                  # ----------------------------------------------------------
                  # 第2.3步：处理下载失败的情况
                  # 只打印前5个错误详情，避免日志过长
                  # ----------------------------------------------------------
                  fail += 1
                  if fail <= 5:
                      print(f"  ✗ {ticker}: {str(e)[:100]}")

          # ----------------------------------------------------------
          # 第3步：保存本Worker的统计信息
          # 写入worker_{id}_stats.txt文件
          # 格式：key=value，方便后续shell脚本source读取
          # ----------------------------------------------------------
          os.makedirs('./logs', exist_ok=True)
          with open(f'./logs/worker_{worker_id}_stats.txt', 'w') as f:
              f.write(f"worker_id={worker_id}\n")
              f.write(f"success={success}\n")
              f.write(f"fail={fail}\n")
              f.write(f"total={len(tasks)}\n")

          print(f"Worker {worker_id} 完成: 成功={success}, 失败={fail}")

          # ----------------------------------------------------------
          # 第4步：检查失败率
          # 如果失败率超过30%，标记Worker为失败状态
          # 这样可以及时发现数据源或网络问题
          # ----------------------------------------------------------
          if fail > len(tasks) * 0.3:
              print(f"失败率过高: {fail/len(tasks)*100:.1f}%")
              sys.exit(1)
          PYEOF

      # ----------------------------------------------------------
      # 步骤2.6：上传本Worker的下载结果
      # 将data目录和logs目录打包为artifact
      # 保留1天（足够后续合并作业使用）
      # artifact名称：worker-{id}-data
      # ----------------------------------------------------------
      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: worker-${{ matrix.worker.worker_id }}-data
          path: |
            ./data/   # 下载的股票数据CSV文件
            ./logs/   # Worker统计日志
          retention-days: 1  # 只保留1天，减少存储占用

  # ============================================================
  # 作业3：合并数据并发布Release
  # 功能：等待所有20个Worker完成后执行
  #       下载所有Worker的artifact，合并数据到统一目录
  #       统计总成功/失败数量，打包为ZIP文件
  #       创建GitHub Release并上传数据包
  #       发送邮件通知（含执行摘要和Release链接）
  # ============================================================
  merge-and-release:
    # 依赖：等待所有Worker完成后才开始合并
    needs: download-worker
    
    # 运行环境：Ubuntu最新版
    runs-on: ubuntu-latest
    
    # 即使部分Worker失败也执行合并（尽量保存已下载的数据）
    if: always()
    
    steps:
      # ----------------------------------------------------------
      # 步骤3.1：检出仓库代码
      # ----------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # ----------------------------------------------------------
      # 步骤3.2：生成版本号
      # 格式：v{YYYYMMDD}-{运行编号}
      # 同时记录北京时间用于通知和Release描述
      # ----------------------------------------------------------
      - name: 生成版本号
        id: version
        run: |
          BEIJING_DATE=$(TZ='Asia/Shanghai' date '+%Y%m%d')  # 北京时间日期
          VERSION="v${BEIJING_DATE}-${{ github.run_number }}"  # 版本号
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BEIJING_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
      
      # ----------------------------------------------------------
      # 步骤3.3：记录工作流开始时间
      # 使用UTC时间戳，用于计算总运行时长
      # ----------------------------------------------------------
      - name: 获取开始时间
        run: echo "START_TIME=$(date -u +%s)" >> $GITHUB_ENV
      
      # ----------------------------------------------------------
      # 步骤3.4：创建本地工作目录
      # data/: 存放合并后的股票数据
      # logs/: 存放合并后的日志文件
      # ----------------------------------------------------------
      - name: 创建目录
        run: mkdir -p ./data ./logs
      
      # ----------------------------------------------------------
      # 步骤3.5：下载所有Worker的artifact
      # 使用merge-multiple模式，将所有Worker的数据合并到./merged目录
      # 这是20个Worker节点数据的集中缓存目录
      # ----------------------------------------------------------
      - name: 下载所有Worker数据
        uses: actions/download-artifact@v4
        with:
          path: ./merged           # 集中缓存目录
          pattern: worker-*-data   # 匹配所有Worker的artifact
          merge-multiple: true     # 合并模式：所有artifact解压到同一目录
      
      # ----------------------------------------------------------
      # 步骤3.6：合并数据并统计
      # 将merged中的data复制到工作目录的data/
      # 读取所有Worker的统计文件，汇总成功/失败数量
      # 统计最终生成的CSV文件总数
      # ----------------------------------------------------------
      - name: 合并数据并统计
        run: |
          # 合并data目录：将集中缓存中的数据复制到工作目录
          if [ -d "./merged/data" ]; then
            cp -r ./merged/data/* ./data/ 2>/dev/null || true
          fi
          
          # 初始化总计数器
          TOTAL_SUCCESS=0  # 总成功数
          TOTAL_FAIL=0     # 总失败数
          
          # 遍历所有Worker的统计文件，累加统计
          # 统计文件格式：worker_id=N, success=N, fail=N, total=N
          for stats_file in ./merged/logs/worker_*_stats.txt; do
            if [ -f "$stats_file" ]; then
              source "$stats_file"  # 读取变量（worker_id, success, fail, total）
              TOTAL_SUCCESS=$((TOTAL_SUCCESS + success))
              TOTAL_FAIL=$((TOTAL_FAIL + fail))
            fi
          done
          
          # 计算总任务数和文件数
          TOTAL=$((TOTAL_SUCCESS + TOTAL_FAIL))
          FILE_COUNT=$(find ./data -type f | wc -l)  # 统计CSV文件数量
          
          # 导出环境变量供后续步骤使用
          echo "TOTAL_SUCCESS=$TOTAL_SUCCESS" >> $GITHUB_ENV
          echo "TOTAL_FAIL=$TOTAL_FAIL" >> $GITHUB_ENV
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "FILE_COUNT=$FILE_COUNT" >> $GITHUB_ENV
          
          # 打印统计摘要
          echo "总计: 成功=$TOTAL_SUCCESS, 失败=$TOTAL_FAIL, 文件=$FILE_COUNT"
      
      # ----------------------------------------------------------
      # 步骤3.7：获取合并服务器的公网IP
      # 关闭命令回显保护隐私
      # ----------------------------------------------------------
      - name: 获取IP
        run: |
          set +x  # 关闭命令回显
          echo "MERGE_IP=$(curl -s https://api64.ipify.org?format=json | jq -r '.ip')" >> $GITHUB_ENV
          set -x  # 恢复命令回显
      
      # ----------------------------------------------------------
      # 步骤3.8：计算工作流总运行时长
      # 结束时间 - 开始时间 = 运行时长
      # 格式化为 HH:MM:SS
      # ----------------------------------------------------------
      - name: 计算运行时长
        run: |
          END_TIME=$(date -u +%s)                    # 结束时间戳
          DURATION=$((END_TIME - START_TIME))        # 总秒数
          H=$((DURATION / 3600))                      # 小时
          M=$(((DURATION % 3600) / 60))               # 分钟
          S=$((DURATION % 60))                        # 秒
          echo "DURATION=$(printf '%02d:%02d:%02d' $H $M $S)" >> $GITHUB_ENV
      
      # ----------------------------------------------------------
      # 步骤3.9：打包数据文件和日志文件
      # stock_data_{version}.zip: 所有股票数据CSV文件
      # workflow_logs_{version}.zip: Worker统计日志和合并日志
      # ----------------------------------------------------------
      - name: 打包
        run: |
          # 打包股票数据（如果有数据的话）
          if [ "$FILE_COUNT" -gt "0" ]; then
            zip -r stock_data_$VERSION.zip ./data/
            echo "DATA_SIZE=$(du -h stock_data_$VERSION.zip | cut -f1)" >> $GITHUB_ENV
          fi
          # 打包日志文件（包含Worker日志和合并日志）
          zip -r workflow_logs_$VERSION.zip ./logs/ ./merged/logs/
          echo "LOG_SIZE=$(du -h workflow_logs_$VERSION.zip | cut -f1)" >> $GITHUB_ENV
      
      # ----------------------------------------------------------
      # 步骤3.10：生成Release描述文件
      # Markdown格式，包含执行摘要、数据统计、链接
      # ----------------------------------------------------------
      - name: 生成Release描述
        run: |
          cat > ./release_body.md << EOF
          ## 📊 20路并行数据采集报告
          
          | 项目 | 信息 |
          |:---|:---|
          | **版本** | $VERSION |
          | **时间** | $BEIJING_TIME (北京时间) |
          | **运行时长** | $DURATION |
          | **模式** | 🌐 20路并行 |
          
          ### 📊 数据统计
          | 项目 | 数值 |
          |:---|:---|
          | 成功 | $TOTAL_SUCCESS |
          | 失败 | $TOTAL_FAIL |
          | 总计 | $TOTAL |
          | 文件数 | $FILE_COUNT |
          
          [查看运行日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
      
      # ----------------------------------------------------------
      # 步骤3.11：创建GitHub Release并上传数据包
      # 使用softprops/action-gh-release动作
      # 上传两个ZIP文件：数据包和日志包
      # fail_on_unmatched_files: false → 文件缺失不报错
      # ----------------------------------------------------------
      - name: 创建Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}           # Release标签
          name: Stock Data ${{ env.VERSION }}    # Release名称
          body_path: ./release_body.md           # Release描述文件
          files: |                                # 上传的文件列表
            stock_data_${{ env.VERSION }}.zip
            workflow_logs_${{ env.VERSION }}.zip
          fail_on_unmatched_files: false         # 文件缺失不报错
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # ----------------------------------------------------------
      # 步骤3.12：发送邮件通知
      # 包含执行摘要：版本、时间、运行时长、成功/失败数量
      # 包含Release链接，方便直接下载数据
      # continue-on-error: true → 邮件发送失败不影响整体流程
      # ----------------------------------------------------------
      - name: 发送邮件通知
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          # SMTP服务器配置（从GitHub Secrets读取）
          server_address: ${{ secrets.MAIL_ADDRESS }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          # 邮件标题：包含时间、成功/失败数量
          subject: 通知UT (${{ env.BEIJING_TIME }}) - 20路并行 ${{ env.TOTAL_SUCCESS }}/${{ env.TOTAL }}
          # 收件人
          to: ${{ secrets.MAIL_TO }}
          # 发件人名称
          from: 数据通知/UT
          # HTML格式邮件正文
          html_body: |
            <h2>📊 20路并行数据采集报告</h2>
            <table border="1" cellpadding="8" cellspacing="0">
              <tr><td><b>版本</b></td><td>${{ env.VERSION }}</td></tr>
              <tr><td><b>时间</b></td><td>${{ env.BEIJING_TIME }}</td></tr>
              <tr><td><b>运行时长</b></td><td>${{ env.DURATION }}</td></tr>
              <tr><td><b>成功/失败</b></td><td>${{ env.TOTAL_SUCCESS }} / ${{ env.TOTAL_FAIL }}</td></tr>
              <tr><td><b>文件数</b></td><td>${{ env.FILE_COUNT }}</td></tr>
            </table>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.VERSION }}">📦 查看Release</a></p>
        continue-on-error: true  # 邮件发送失败不中断流程
      
      # ----------------------------------------------------------
      # 步骤3.13：清理临时文件
      # 删除merged集中缓存目录（数据已转移至data/）
      # 删除本地ZIP文件（已上传至Release）
      # 虽然虚拟机会在作业结束后自动销毁，但显式清理是好习惯
      # ----------------------------------------------------------
      - name: 清理
        if: always()
        run: |
          rm -rf ./merged                              # 删除20个Worker的集中缓存目录
          rm -f stock_data_$VERSION.zip                # 删除本地数据ZIP包
          rm -f workflow_logs_$VERSION.zip             # 删除本地日志ZIP包
