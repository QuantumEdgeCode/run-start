# ============================================================
# 工作流名称：分批清理大文件历史记录
# 功能：分批处理大仓库，避免超时
# ============================================================
name: 分批清理大文件历史记录

on:
  workflow_dispatch:
    inputs:
      size_threshold:
        description: '文件大小阈值（单位：MB）'
        required: false
        default: '10'
        type: string
      batch_size:
        description: '每批处理的文件数量（大仓库建议500-1000）'
        required: false
        default: '500'
        type: string
      force_push:
        description: '强制推送到远程仓库'
        required: false
        default: false
        type: boolean

env:
  MAIL_ADDRESS: ${{ secrets.MAIL_ADDRESS }}
  MAIL_PORT: ${{ secrets.MAIL_PORT }}
  MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
  MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
  MAIL_TO: ${{ secrets.MAIL_TO }}

jobs:
  # ============================================================
  # 作业1：分析阶段（快速扫描）
  # ============================================================
  analyze:
    name: 分析大文件
    runs-on: ubuntu-latest
    outputs:
      has_files: ${{ steps.analyze.outputs.HAS_FILES }}
      delete_count: ${{ steps.analyze.outputs.DELETE_COUNT }}
      batch_count: ${{ steps.analyze.outputs.BATCH_COUNT }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 分析大文件
        id: analyze
        run: |
          THRESHOLD="${{ github.event.inputs.size_threshold || '10' }}"
          THRESHOLD_BYTES=$((THRESHOLD * 1024 * 1024))
          BATCH_SIZE="${{ github.event.inputs.batch_size || '500' }}"
          
          echo "🔍 扫描阈值: ${THRESHOLD}MB"
          echo "📦 批次大小: ${BATCH_SIZE}个文件/批"
          
          # 获取当前文件列表
          git ls-tree -r HEAD --name-only | sort > /tmp/current-files.txt
          
          # 查找历史大文件（只找已删除的）
          git rev-list --objects --all | \
            git cat-file --batch-check='%(objecttype) %(objectsize) %(rest)' | \
            awk -v threshold="$THRESHOLD_BYTES" '
              /^blob/ && $2 > threshold {
                printf "%s\t%s\n", $2, $3
              }
            ' | sort -t$'\t' -k2 -u > /tmp/all-large.txt
          
          # 筛选已删除的文件
          > /tmp/to-delete.txt
          while IFS=$'\t' read -r size path; do
            if ! grep -qxF "$path" /tmp/current-files.txt; then
              echo "$path" >> /tmp/to-delete.txt
            fi
          done < /tmp/all-large.txt
          
          DELETE_COUNT=$(wc -l < /tmp/to-delete.txt)
          
          if [ "$DELETE_COUNT" -eq 0 ]; then
            echo "HAS_FILES=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 分批
          split -l "$BATCH_SIZE" /tmp/to-delete.txt /tmp/batch_
          BATCH_COUNT=$(ls /tmp/batch_* | wc -l)
          
          echo "HAS_FILES=true" >> $GITHUB_OUTPUT
          echo "DELETE_COUNT=${DELETE_COUNT}" >> $GITHUB_OUTPUT
          echo "BATCH_COUNT=${BATCH_COUNT}" >> $GITHUB_OUTPUT
          
          echo "📊 需清理: ${DELETE_COUNT} 个文件，分 ${BATCH_COUNT} 批处理"
          
          # 上传批次文件
          mkdir -p /tmp/batches
          cp /tmp/batch_* /tmp/batches/
          cp /tmp/to-delete.txt /tmp/batches/
      
      - name: 上传批次文件
        uses: actions/upload-artifact@v4
        with:
          name: file-batches
          path: /tmp/batches
          retention-days: 1

  # ============================================================
  # 作业2：分批清理（使用矩阵策略）
  # ============================================================
  clean-batch:
    name: 清理批次
    needs: analyze
    if: needs.analyze.outputs.has_files == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 每批最多60分钟
    strategy:
      fail-fast: false
      matrix:
        batch: [1, 2, 3, 4, 5]  # 最多5批并行（可根据需要调整）
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 下载批次文件
        uses: actions/download-artifact@v4
        with:
          name: file-batches
          path: /tmp/batches
      
      - name: 执行清理
        id: clean
        run: |
          BATCH_FILE="/tmp/batches/batch_$(printf '%02d' ${{ matrix.batch }})"
          
          # 检查批次文件是否存在
          if [ ! -f "$BATCH_FILE" ]; then
            echo "✅ 批次 ${{ matrix.batch }} 不存在，跳过"
            echo "SKIP=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          BATCH_COUNT=$(wc -l < "$BATCH_FILE")
          echo "🔧 处理批次 ${{ matrix.batch }}: ${BATCH_COUNT} 个文件"
          
          # 安装工具
          sudo apt-get update -qq && sudo apt-get install -y -qq git-filter-repo
          
          # 执行清理
          git filter-repo \
            --invert-paths \
            --paths-from-file "$BATCH_FILE" \
            --force
          
          echo "✅ 批次 ${{ matrix.batch }} 完成"
          echo "SKIP=false" >> $GITHUB_OUTPUT
      
      - name: 优化仓库
        if: steps.clean.outputs.SKIP != 'true'
        run: |
          rm -rf .git/objects/pack/tmp_pack_*
          git gc --aggressive --prune=now
          git repack -a -d -f --depth=50 --window=50
      
      - name: 推送批次
        if: steps.clean.outputs.SKIP != 'true' && github.event.inputs.force_push == 'true'
        run: |
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git config http.postBuffer 524288000
          
          # 只推送主分支
          git push origin --force main || echo "推送失败，将在最终步骤统一处理"

  # ============================================================
  # 作业3：最终优化和推送
  # ============================================================
  finalize:
    name: 最终优化
    needs: [analyze, clean-batch]
    if: always() && needs.analyze.outputs.has_files == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 最终优化
        run: |
          echo "🧹 执行最终优化..."
          
          # 清理所有垃圾
          rm -rf .git/objects/pack/tmp_pack_*
          git reflog expire --expire=now --all
          git gc --aggressive --prune=now
          git repack -a -d -f --depth=250 --window=250
          git prune
          
          # 显示最终大小
          echo "📊 最终仓库大小："
          git count-objects -vH
      
      - name: 最终推送
        if: github.event.inputs.force_push == 'true'
        run: |
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git config http.postBuffer 1073741824  # 1GB
          
          # 推送主分支
          git push origin --force main
          
          # 推送其他分支和标签
          git push origin --force --all
          git push origin --force --tags
      
      - name: 发送完成报告
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_ADDRESS }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ 大文件清理完成 - ${{ github.repository }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            仓库 ${{ github.repository }} 的大文件清理已完成。
            
            清理统计：
            - 总文件数: ${{ needs.analyze.outputs.delete_count }}
            - 分批数: ${{ needs.analyze.outputs.batch_count }}
            - 推送状态: ${{ github.event.inputs.force_push == 'true' && '已推送' || '未推送' }}
            
            请所有协作者重新克隆仓库。
          priority: normal
