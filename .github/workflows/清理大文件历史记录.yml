# ============================================================
# 工作流名称：快速清理大文件历史记录
# 策略：使用BFG直接删除大于阈值的blob对象
# 先用 force_push=false 测试，确认效果后再推送
# ============================================================
name: 快速清理大文件历史记录

on:
  workflow_dispatch:
    inputs:
      size_threshold:
        description: '文件大小阈值（单位：MB）'
        required: false
        default: '10'
        type: string
      force_push:
        description: '强制推送到远程仓库（先设为false测试）'
        required: false
        default: false
        type: boolean

env:
  MAIL_ADDRESS: ${{ secrets.MAIL_ADDRESS }}
  MAIL_PORT: ${{ secrets.MAIL_PORT }}
  MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
  MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
  MAIL_TO: ${{ secrets.MAIL_TO }}

jobs:
  clean-large-files:
    name: 快速清理大文件
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 使用BFG清理大文件
        id: clean
        run: |
          export PYTHONUNBUFFERED=1
          
          THRESHOLD="${{ github.event.inputs.size_threshold || '10' }}"
          
          echo "=========================================="
          echo "阈值: ${THRESHOLD}MB"
          echo "开始: $(date '+%H:%M:%S')"
          echo "=========================================="

          # 记录清理前大小
          echo ""
          echo "清理前 .git 大小:"
          du -sh .git
          BEFORE_SIZE=$(du -sh .git | cut -f1)
          echo "BEFORE_SIZE=${BEFORE_SIZE}" >> $GITHUB_OUTPUT

          # 保存当前文件列表用于验证
          git ls-tree -r HEAD --name-only > /tmp/current-files.txt
          echo "当前文件数: $(wc -l < /tmp/current-files.txt)"

          # 下载BFG
          echo ""
          echo "下载 BFG..."
          wget -q https://repo1.maven.org/maven2/com/madgag/bfg/1.14.0/bfg-1.14.0.jar -O /tmp/bfg.jar
          echo "BFG 下载完成"

          # 先扫描大文件数量
          echo ""
          echo "扫描大文件对象..."
          THRESHOLD_BYTES=$((THRESHOLD * 1024 * 1024))
          git rev-list --objects --all | \
            git cat-file --batch-check='%(objecttype) %(objectsize) %(rest)' | \
            awk -v t="$THRESHOLD_BYTES" '/^blob/ && $2>t {count++; size+=$2} END {
              printf "大文件对象: %d 个, 总大小: %.2f MB\n", count, size/1024/1024
            }'

          # 执行BFG清理
          echo ""
          echo "执行 BFG 清理..."
          java -jar /tmp/bfg.jar \
            --strip-blobs-bigger-than "${THRESHOLD}M" \
            --no-blob-protection \
            . 2>&1 | grep -E "Deleted|Cleaned|commit|Total|size" || true

          echo ""
          echo "BFG 清理完成，清理引用..."
          git reflog expire --expire=now --all
          git gc --prune=now --aggressive

          # 记录清理后大小
          echo ""
          echo "清理后 .git 大小:"
          du -sh .git
          AFTER_SIZE=$(du -sh .git | cut -f1)
          echo "AFTER_SIZE=${AFTER_SIZE}" >> $GITHUB_OUTPUT

          # 检查当前文件是否完整
          echo ""
          echo "验证文件完整性..."
          MISSING=0
          while IFS= read -r f; do
            [ ! -f "$f" ] && { echo "缺失: $f"; MISSING=$((MISSING+1)); }
          done < /tmp/current-files.txt
          
          if [ "$MISSING" -eq 0 ]; then
            echo "所有文件完整"
          else
            echo "缺失 ${MISSING} 个文件!"
          fi
          echo "FILE_CHECK=${MISSING}" >> $GITHUB_OUTPUT
          
          echo "结束: $(date '+%H:%M:%S')"

      - name: 推送
        if: steps.clean.outputs.FILE_CHECK == '0' && github.event.inputs.force_push == 'true'
        run: |
          echo "添加远程仓库..."
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git config http.postBuffer 1073741824
          
          echo "推送..."
          git push origin --force --all
          git push origin --force --tags
          echo "推送完成"

      - name: 发送邮件报告
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_ADDRESS }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "大文件清理 - ${{ github.repository }} - ${{ steps.clean.outputs.AFTER_SIZE || 'N/A' }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            仓库: ${{ github.repository }}
            时间: $(date '+%Y-%m-%d %H:%M:%S')
            
            清理前: ${{ steps.clean.outputs.BEFORE_SIZE }}
            清理后: ${{ steps.clean.outputs.AFTER_SIZE }}
            阈值: ${{ github.event.inputs.size_threshold }}MB
            文件完整性: ${{ steps.clean.outputs.FILE_CHECK == '0' && '正常' || '有缺失!' }}
          priority: normal

      - name: 摘要
        run: |
          echo ""
          echo "=========================================="
          echo "完成"
          echo "清理前: ${{ steps.clean.outputs.BEFORE_SIZE }}"
          echo "清理后: ${{ steps.clean.outputs.AFTER_SIZE }}"
          echo "文件完整性: ${{ steps.clean.outputs.FILE_CHECK == '0' && '正常' || '有缺失!' }}"
          echo "=========================================="
